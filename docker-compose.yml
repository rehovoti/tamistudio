version: '3.8'

services:
  tami-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tami-studio-web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - tami-network
    # Resource limits (adjust based on your droplet size)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tami-network:
    driver: bridge

# Volumes for SSL certificates (for future use with Let's Encrypt)
volumes:
  ssl-certs:
    driver: local
